apiVersion: v1
kind: ServiceAccount
metadata:
  name: zeus
  namespace: zeus
---
# Read-only access to nodes, pods, and namespaces so the dashboard's
# Kubernetes panel can summarise the cluster. No write permissions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zeus-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zeus-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zeus-reader
subjects:
  - kind: ServiceAccount
    name: zeus
    namespace: zeus
